name: libra-api
region: nyc

alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED

services:
  - name: api
    dockerfile_path: Dockerfile
    source_dir: /

    github:
      repo: YOUR_GITHUB_OWNER/YOUR_REPO
      branch: main
      deploy_on_push: true

    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs

    health_check:
      initial_delay_seconds: 30
      period_seconds: 10
      timeout_seconds: 5

    envs:
      - key: PORT
        value: "8080"
        scope: RUN_TIME

      - key: NODE_ENV
        value: production
        scope: RUN_TIME

      # DATABASE_URL must be available at runtime for prisma migrate deploy
      - key: DATABASE_URL
        value: YOUR_DATABASE_URL
        type: SECRET
        scope: RUN_TIME

      - key: JWT_SECRET
        value: YOUR_JWT_SECRET
        type: SECRET
        scope: RUN_TIME

      - key: GOOGLE_CLIENT_ID
        value: YOUR_GOOGLE_CLIENT_ID
        scope: RUN_TIME

      - key: GOOGLE_SECRET_ID
        value: YOUR_GOOGLE_SECRET
        type: SECRET
        scope: RUN_TIME

      - key: GOOGLE_CALLBACK_API
        value: https://YOUR_APP_URL/api/v1/auth/google/callback
        scope: RUN_TIME

      - key: GOOGLE_GEMINI_API
        value: YOUR_GEMINI_API_KEY
        type: SECRET
        scope: RUN_TIME

      - key: EMBED_MODEL
        value: gemini-embedding-001
        scope: RUN_TIME

      - key: QDRANT_CLUSTER_ID
        value: YOUR_QDRANT_CLUSTER_URL
        scope: RUN_TIME

      - key: QDRANT_API_URL
        value: YOUR_QDRANT_API_KEY
        type: SECRET
        scope: RUN_TIME

      - key: SERPER_API
        value: YOUR_SERPER_API_KEY
        type: SECRET
        scope: RUN_TIME
