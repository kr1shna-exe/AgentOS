# DigitalOcean App Platform - libra apps/api
# Deploy: doctl apps create --spec .do/app.yaml
# Update: doctl apps update <app-id> --spec .do/app.yaml

name: libra-api
region: nyc

# Ubuntu 22 for buildpack stack compatibility
features:
  - buildpack-stack=ubuntu-22

alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED

services:
  - name: api
    # Dockerfile build (required for Bun runtime)
    dockerfile_path: apps/api/Dockerfile
    source_dir: /

    # Git source - replace with your repo
    github:
      repo: YOUR_GITHUB_OWNER/YOUR_REPO
      branch: main
      deploy_on_push: true

    # Alternative: use generic git
    # git:
    #   repo_clone_url: https://github.com/YOUR_OWNER/YOUR_REPO.git
    #   branch: main

    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs

    # Health check (TCP - no http_path = TCP check)
    health_check:
      initial_delay_seconds: 30
      period_seconds: 10
      timeout_seconds: 5

    # Required env vars - set in App Platform UI (SECRET for sensitive values)
    envs:
      - key: PORT
        value: "8080"
        type: GENERAL
        scope: RUN_TIME
      - key: NODE_ENV
        value: production
        type: GENERAL
        scope: RUN_TIME
      # Database: set manually, or use ${db.DATABASE_URL} if you add a databases component
      - key: DATABASE_URL
        value: YOUR_DATABASE_URL
        type: SECRET
        scope: RUN_TIME
      # JWT - set as SECRET in UI
      - key: JWT_SECRET
        value: YOUR_JWT_SECRET
        type: SECRET
        scope: RUN_TIME
      # Google OAuth - set in App Platform UI
      - key: GOOGLE_CLIENT_ID
        value: YOUR_GOOGLE_CLIENT_ID
        type: GENERAL
        scope: RUN_TIME
      - key: GOOGLE_SECRET_ID
        value: YOUR_GOOGLE_SECRET
        type: SECRET
        scope: RUN_TIME
      - key: GOOGLE_CALLBACK_API
        value: https://YOUR_APP_URL/api/v1/auth/google/callback
        type: GENERAL
        scope: RUN_TIME
      # Gemini - set as SECRET in UI
      - key: GOOGLE_GEMINI_API
        value: YOUR_GEMINI_API_KEY
        type: SECRET
        scope: RUN_TIME
      - key: EMBED_MODEL
        value: gemini-embedding-001
        type: GENERAL
        scope: RUN_TIME
      # Qdrant vector DB
      - key: QDRANT_CLUSTER_ID
        value: https://YOUR_CLUSTER.gcp.cloud.qdrant.io:6333
        type: GENERAL
        scope: RUN_TIME
      - key: QDRANT_API_URL
        value: YOUR_QDRANT_API_KEY
        type: SECRET
        scope: RUN_TIME
      # Serper (web search)
      - key: SERPER_API
        value: YOUR_SERPER_API_KEY
        type: SECRET
        scope: RUN_TIME
